<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bookmark Batch Fixer — Scan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font: 14px/1.6 -apple-system, BlinkMacSystemFont, sans-serif; padding: 24px; background: #fafafa; color: #333; max-width: 900px; margin: 0 auto; }
    h1 { font-size: 20px; margin-bottom: 16px; }
    .stats { display: flex; gap: 24px; margin-bottom: 16px; font-size: 13px; color: #666; }
    .stats .num { font-size: 18px; font-weight: 600; color: #333; display: block; }
    .progress-wrap { margin-bottom: 16px; }
    .progress-bar-outer { height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
    .progress-bar-inner { height: 100%; width: 0%; background: #1a73e8; transition: width 0.3s; }
    .progress-text { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-top: 4px; }
    .actions { margin-bottom: 16px; display: flex; gap: 8px; }
    button { padding: 8px 20px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; }
    button:hover { background: #f5f5f5; }
    button.primary { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    button.primary:hover { background: #1557b0; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.danger { background: #d93025; color: #fff; border-color: #d93025; }
    button.danger:hover { background: #b3261e; }
    .log-wrap { border: 1px solid #e0e0e0; border-radius: 4px; background: #fff; max-height: 400px; overflow-y: auto; }
    .log-entry { padding: 4px 12px; font-size: 12px; font-family: monospace; border-bottom: 1px solid #f0f0f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-entry.alive { color: #188038; }
    .log-entry.dead { color: #d93025; }
    .log-entry.uncertain { color: #b06000; }
    .log-entry.skipped { color: #999; }
    .summary { margin-top: 16px; padding: 12px; background: #e8f5e9; border-radius: 4px; font-size: 14px; }
    .summary.partial { background: #fff3cd; }
  </style>
</head>
<body>
  <h1>Scanning Bookmarks…</h1>

  <div class="stats">
    <div><span class="num" id="stat-total">-</span> Total bookmarks</div>
    <div><span class="num" id="stat-alive">0</span> Alive</div>
    <div><span class="num" id="stat-dead">0</span> Dead</div>
    <div><span class="num" id="stat-uncertain">0</span> Uncertain</div>
    <div><span class="num" id="stat-skipped">0</span> Skipped</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="progress-bar"></div></div>
    <div class="progress-text">
      <span id="progress-count">0 / 0</span>
      <span id="progress-elapsed">0s elapsed</span>
      <span id="progress-eta">Estimating…</span>
    </div>
  </div>

  <div class="actions">
    <button class="danger" id="btn-cancel">Cancel</button>
    <button class="primary" id="btn-review" style="display:none">Open Review</button>
  </div>

  <div class="log-wrap" id="log"></div>
  <div class="summary" id="summary" style="display:none"></div>

  <script src="checker.js"></script>
  <script src="scan.js"></script>
</body>
</html>
